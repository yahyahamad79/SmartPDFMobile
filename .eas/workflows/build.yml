name: Build Android APK (No Expo — Pure Gradle)

# يعمل يدوياً فقط. بناء كامل بدون أي حساب أو توكن Expo —
# فقط prebuild محلي (توليد كود) ثم Gradle خام.
on:
  workflow_dispatch: {}

# لو شغّلت الـ workflow مرتين بالغلط، يلغي التشغيل الأقدم تلقائياً
# بدل ما يهدر وقت بناء مضاعف بلا داعي.
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_android:
    name: Build Android App (Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 60   # حماية من تعليق لا نهائي (البناء العادي ~10-40 دقيقة)

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1   # نسخ سطحي أسرع — لا نحتاج تاريخ Git الكامل

      - name: 🏗 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🏗 Setup Java (مطلوب لـ Gradle)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # يخزّن مخرجات Gradle (الاعتماديات المُنزَّلة، الملفات المُصرَّفة)
      # بين التشغيلات — يختصر وقت البناء بشكل كبير من التشغيل الثاني فصاعداً
      - name: 🏗 Setup Gradle (مع Cache)
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic   # مفتوح المصدر بالكامل، يعمل بأي مستودع

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧬 توليد مجلد android الأصلي (بدون حساب Expo)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: 🚀 بناء APK عبر Gradle مباشرة (بلا Expo إطلاقاً)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: ⬆️ رفع ملف الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: ./android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14   # حذف تلقائي بعد أسبوعين لتوفير مساحة التخزين
