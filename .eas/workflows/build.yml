name: Build Android APK (No Expo — Pure Gradle)

# يعمل يدوياً فقط. بناء كامل بدون أي حساب أو توكن Expo —
# فقط prebuild محلي (توليد كود) ثم Gradle خام.
on:
  workflow_dispatch: {}

jobs:
  build_android:
    name: Build Android App (Gradle)
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Java (مطلوب لـ Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧬 توليد مجلد android الأصلي (بدون حساب Expo)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: 🚀 بناء APK عبر Gradle مباشرة (بلا Expo إطلاقاً)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: ⬆️ رفع ملف الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: ./android/app/build/outputs/apk/debug/app-debug.apk
