name: Build Android APK

# يعمل يدوياً فقط (لا يبدأ تلقائياً عند الـ push) — لتوفير حصة البناء.
# نحدّد triggers صراحةً ككائن حتى يقبله EAS Workflows.
on:
  workflow_dispatch: {}

jobs:
  build_android:
    name: Build Android App
    type: build
    params:
      platform: android
      profile: preview
